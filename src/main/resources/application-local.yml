spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/cabinet_db
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    database: postgresql
    properties:
      hibernate.format_sql: true
    hibernate:
      ddl-auto: update 
